name: Build and publish frontend image

# Builds the production image here instead of on Render: GitHub-hosted
# runners have far more RAM/CPU than Render's free build container, which
# was getting SIGKILLed partway through `next build`. Render then just pulls
# the already-built image (see render.yaml, runtime: image), which needs
# much less memory than actually compiling the app.
on:
  push:
    branches: [master]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name
        id: image
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
        env:
          REGISTRY: ${{ env.REGISTRY }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://bizintel-backend.onrender.com
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Render pulls whatever is tagged :latest on GHCR, but it does not poll
      # the registry for changes, so without this, a new image just sits
      # here unused until someone manually redeploys from the dashboard.
      # Render's deploy hook is a plain POST URL, no payload needed. The
      # check for whether the secret is set happens in shell, not in `if:`,
      # since referencing `secrets` directly in a step's `if:` condition is
      # not permitted and fails the whole workflow before any step runs.
      - name: Trigger Render deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$DEPLOY_HOOK_URL" ]; then
            curl -fsS -X POST "$DEPLOY_HOOK_URL"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set, skipping deploy trigger"
          fi
